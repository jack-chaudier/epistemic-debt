name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-integrity:
    name: Fast integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.9.26"
      - name: Run fast tests
        run: uv run --with pytest==9.1.1 --no-project -- pytest tests/ --ignore=tests/test_proofs.py --ignore=tests/test_section_obstruction.py -q
      - name: Check Python syntax
        run: python3 -m compileall -q experiments proofs tests
      - name: Check whitespace
        run: git diff --check

  exact-verification:
    name: Exact verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.9.26"
      - name: Run exact-model tests
        run: uv run --with pytest==9.1.1 --no-project -- pytest tests/test_proofs.py tests/test_section_obstruction.py -q
      - name: Run standalone exact verifiers
        run: |
          python3 proofs/shelf_width_law.py
          python3 proofs/section_obstruction.py
