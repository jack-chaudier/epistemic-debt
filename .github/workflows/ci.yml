name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-integrity:
    name: Fast integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.9.26"
          enable-cache: false
      - name: Run fast tests
        run: uv run --with pytest==9.1.1 --no-project -- pytest tests/ --ignore=tests/test_proofs.py --ignore=tests/test_section_obstruction.py -q
      - name: Check Python syntax
        run: python3 -m compileall -q experiments proofs tests
      - name: Check whitespace
        run: git diff --check

  exact-verification:
    name: Exact verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.9.26"
          enable-cache: false
      - name: Run exact-model tests
        run: uv run --with pytest==9.1.1 --no-project -- pytest tests/test_proofs.py tests/test_section_obstruction.py -q
      - name: Run standalone exact verifiers
        run: |
          python3 proofs/shelf_width_law.py
          python3 proofs/section_obstruction.py
